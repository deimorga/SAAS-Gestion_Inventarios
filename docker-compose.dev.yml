version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    container_name: inv-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Dashboard en dev
    networks:
      - inv_edge
      - inv_app
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-api
    networks:
      - inv_app
      - inv_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-devpassword123}@inv-postgres:5432/${POSTGRES_DB:-inventory_db}
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inv-api.rule=Host(`api.inventory.local`)"
      - "traefik.http.services.inv-api.loadbalancer.server.port=8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-worker
    networks:
      - inv_app
      - inv_data
    command: celery -A app.tasks worker --loglevel=info --concurrency=4 -Q default,webhooks,bulk
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-devpassword123}@inv-postgres:5432/${POSTGRES_DB:-inventory_db}
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-beat
    networks:
      - inv_app
    command: celery -A app.tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: inv-postgres
    ports:
      - "5432:5432" # Expuesto solo para dev
    networks:
      - inv_data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-inventory_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword123}
      - POSTGRES_DB=${POSTGRES_DB:-inventory_db}
    volumes:
      - inv_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-inventory_user}", "-d", "${POSTGRES_DB:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inv-redis
    ports:
      - "6379:6379" # Expuesto solo para dev
    networks:
      - inv_app
      - inv_data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - inv_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  inv_edge:
    name: inv_edge
  inv_app:
    name: inv_app
  inv_data:
    name: inv_data

volumes:
  inv_postgres_data:
  inv_redis_data:
