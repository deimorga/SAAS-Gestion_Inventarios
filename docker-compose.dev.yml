version: "3.8"

# Desarrollo local — sin gateway.
# API accesible en http://localhost:8002
# Docs en http://localhost:8002/docs

services:
  api:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-api
    ports:
      - "8002:8000"
    networks:
      - inv_app
      - inv_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-devpassword123}@inv-postgres:5432/${POSTGRES_DB:-inventory_db}
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-worker
    networks:
      - inv_app
      - inv_data
    command: celery -A app.tasks worker --loglevel=info --concurrency=4 -Q default,webhooks,bulk
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-devpassword123}@inv-postgres:5432/${POSTGRES_DB:-inventory_db}
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./core_backend
      dockerfile: Dockerfile.dev
    container_name: inv-beat
    networks:
      - inv_app
    command: celery -A app.tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://inv-redis:6379/0
      - CELERY_BROKER_URL=redis://inv-redis:6379/1
    volumes:
      - ./core_backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: inv-postgres
    ports:
      - "5433:5432" # Expuesto solo para dev (5433 evita colisión con otros proyectos)
    networks:
      - inv_data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-inventory_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword123}
      - POSTGRES_DB=${POSTGRES_DB:-inventory_db}
    volumes:
      - inv_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-inventory_user}", "-d", "${POSTGRES_DB:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inv-redis
    ports:
      - "6380:6379" # Expuesto solo para dev (6380 evita colisión con otros proyectos)
    networks:
      - inv_app
      - inv_data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - inv_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  inv_app:
    name: inv_app
  inv_data:
    name: inv_data

volumes:
  inv_postgres_data:
  inv_redis_data:
